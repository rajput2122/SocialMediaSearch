name: Sandcastle Agent Loop

on:
  issues:
    types: [labeled]

jobs:
  run:
    if: github.event.label.name == 'sandcastle-ready'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.email "sandcastle@github-actions"
          git config --global user.name "Sandcastle Agent"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install sandcastle dependencies
        working-directory: .sandcastle
        run: npm ci

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build agent Docker image
        run: npx @ai-hero/sandcastle docker build-image

      - name: Run sandcastle loop
        working-directory: ${{ github.workspace }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: .sandcastle/node_modules/.bin/tsx .sandcastle/main.ts
