spring.application.name=SocialMediaSearch

# H2
spring.datasource.url=jdbc:h2:mem:socialmedia;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Elasticsearch
spring.elasticsearch.uris=http://localhost:9200
# Fail fast if ES is unreachable; cap how long a single ES request may block a Tomcat worker.
spring.elasticsearch.connection-timeout=2s
spring.elasticsearch.socket-timeout=5s

# Resilience4j circuit breaker for ES search calls
resilience4j.circuitbreaker.instances.elasticsearch.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.elasticsearch.sliding-window-size=20
resilience4j.circuitbreaker.instances.elasticsearch.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.elasticsearch.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.elasticsearch.slow-call-rate-threshold=100
resilience4j.circuitbreaker.instances.elasticsearch.slow-call-duration-threshold=5s
resilience4j.circuitbreaker.instances.elasticsearch.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.elasticsearch.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.elasticsearch.automatic-transition-from-open-to-half-open-enabled=true

# Logging
logging.level.org.springframework.data.elasticsearch.client=DEBUG